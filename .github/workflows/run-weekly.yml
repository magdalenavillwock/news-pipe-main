name: Run Weekly Summary
on:
  workflow_call:
    inputs:
      subscription:
        required: true
        type: string
        description: "Subscription ID from config.yaml"

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code
      - run: pip install -r requirements.txt
      - run: python weekly_summary.py ${{ inputs.subscription }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - name: Commit summary
        run: |
          git config user.name "News Pipe Bot"
          git config user.email "bot@news-pipe.local"
          git add output/
          git diff --staged --quiet || git commit -m "${{ inputs.subscription }}: Weekly Summary $(date +%Y-%m-%d)"
          git push
      - name: Cleanup old summaries
        run: |
          find output/${{ inputs.subscription }}/weekly/ -type f -mtime +90 -delete 2>/dev/null || true
          git add -A output/
          git diff --staged --quiet || git commit -m "${{ inputs.subscription }}: Cleanup summaries older than 90 days"
          git push
