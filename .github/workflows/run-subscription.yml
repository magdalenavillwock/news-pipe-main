name: Run Subscription
on:
  workflow_call:
    inputs:
      subscription:
        required: true
        type: string
        description: "Subscription ID from config.yaml"

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code
      - run: pip install -r requirements.txt
      - run: python daily_digest.py ${{ inputs.subscription }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      - name: Commit digest
        run: |
          git config user.name "News Pipe Bot"
          git config user.email "bot@news-pipe.local"
          git add output/ data/
          git diff --staged --quiet || git commit -m "${{ inputs.subscription }}: Digest $(date +%Y-%m-%dT%H:%M)"
          git push
      - name: Cleanup old digests
        run: |
          find output/${{ inputs.subscription }}/ data/${{ inputs.subscription }}/ -type f -mtime +90 -delete 2>/dev/null || true
          git add -A output/ data/
          git diff --staged --quiet || git commit -m "${{ inputs.subscription }}: Cleanup digests older than 90 days"
          git push
