name: "Wirtschafts-News Deutschland"
on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Datum ueberschreiben (YYYY-MM-DD), leer = heute"
        required: false
        default: ""
permissions:
  contents: write
jobs:
  run:
    uses: ./.github/workflows/run-subscription.yml
    with:
      subscription: wirtschafts-news
      date: ${{ inputs.date || '' }}
    secrets: inherit
