settings:
  daily_model: claude-sonnet-4-6
  weekly_model: claude-opus-4-6
  request_timeout: 30
  max_retries: 3
  log_level: INFO
  cleanup_days: 90
  max_articles_per_source: 10
  max_age_hours: 26

subscriptions:
  ai-news:
    name: "AI & ML News"
    description: "Tägliche AI/ML News mit Fokus auf Claude Code Features"
    language: de
    type: news
    ntfy:
      enabled: true
      server: https://ntfy.sh
      topic: news-push-ai
    prompt_focus: |
      Besonderer Fokus auf Anthropic und Claude:
      - Liste ALLE neuen Features, Bugfixes und Änderungen aus Claude Code Release Notes detailliert auf.
        Jedes Feature einzeln als Aufzählungspunkt mit kurzer Erklärung.
      - Claude SDK Updates (Python/TypeScript): Neue Methoden, Breaking Changes, wichtige Fixes.
      - Anthropic Ankündigungen: Neue Modelle, Preisänderungen, Policy-Updates.
      - Wissenschaftliche Paper zu LLMs und AI Safety besonders hervorheben.
    sources:
      anthropic:
        - name: Anthropic Engineering
          type: rss
          url: https://raw.githubusercontent.com/taobojlen/anthropic-rss-feed/main/anthropic_engineering_rss.xml
          priority: high
        - name: Claude Code Releases
          type: github_releases
          repo: anthropics/claude-code
          priority: high
        - name: Claude SDK Python
          type: github_releases
          repo: anthropics/anthropic-sdk-python
          priority: high
        - name: Claude SDK TypeScript
          type: github_releases
          repo: anthropics/anthropic-sdk-typescript
          priority: high
        - name: Claude Agent SDK
          type: github_releases
          repo: anthropics/claude-agent-sdk
          priority: high
      big_labs:
        - name: OpenAI Blog
          type: rss
          url: https://openai.com/blog/rss.xml
          priority: medium
        - name: Google DeepMind
          type: rss
          url: https://deepmind.google/blog/rss.xml
          priority: medium
        - name: Google AI Blog
          type: rss
          url: https://blog.google/technology/ai/rss/
          priority: medium
        - name: Microsoft AI Blog
          type: rss
          url: https://news.microsoft.com/source/feed/
          priority: medium
        - name: Meta Engineering
          type: rss
          url: https://engineering.fb.com/feed/
          priority: medium
        - name: Apple ML Research
          type: rss
          url: https://machinelearning.apple.com/rss.xml
          priority: medium
        - name: AWS AI Blog
          type: rss
          url: https://aws.amazon.com/blogs/machine-learning/feed/
          priority: medium
        - name: NVIDIA AI Blog
          type: rss
          url: https://blogs.nvidia.com/feed/
          priority: medium
      news:
        - name: The Verge AI
          type: rss
          url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
          priority: medium
        - name: TechCrunch AI
          type: rss
          url: https://techcrunch.com/category/artificial-intelligence/feed/
          priority: medium
        - name: Ars Technica
          type: rss
          url: https://feeds.arstechnica.com/arstechnica/technology-lab
          priority: low
        - name: VentureBeat
          type: rss
          url: https://venturebeat.com/feed/
          priority: low
      platforms:
        - name: HuggingFace Blog
          type: rss
          url: https://huggingface.co/blog/feed.xml
          priority: medium
        - name: HuggingFace Transformers
          type: github_releases
          repo: huggingface/transformers
          priority: medium
      research:
        - name: ArXiv cs.AI
          type: arxiv
          arxiv_category: cs.AI
          max_results: 5
          priority: medium
        - name: ArXiv cs.CL
          type: arxiv
          arxiv_category: cs.CL
          max_results: 5
          priority: medium
      tools:
        - name: GitHub Trending AI
          type: github_trending
          query: "artificial intelligence OR machine learning OR LLM"
          min_stars: 100
          days_back: 7
          priority: low

  wirtschafts-news:
    name: "Wirtschafts-News Deutschland"
    description: "Tägliches Finanz-Morning-Briefing und Wochenanalyse für deutsche/europäische Märkte"
    language: de
    type: finance
    ntfy:
      enabled: true
      server: https://ntfy.sh
      topic: news-pipe-wirtschafts-news
    sources:
      leitmedien:
        - name: Handelsblatt Schlagzeilen
          type: rss
          url: https://feeds.cms.handelsblatt.com/schlagzeilen
          priority: high
        - name: Wirtschaftswoche
          type: rss
          url: https://feeds.cms.wiwo.de/rss/schlagzeilen
          priority: high
        - name: FAZ Wirtschaft
          type: rss
          url: https://www.faz.net/rss/aktuell/wirtschaft/
          priority: high
        - name: Manager Magazin
          type: rss
          url: https://www.manager-magazin.de/news/index.rss
          priority: high
      nachrichten:
        - name: Tagesschau Wirtschaft
          type: rss
          url: https://www.tagesschau.de/wirtschaft/index~rss2.xml
          priority: medium
        - name: Spiegel Wirtschaft
          type: rss
          url: https://www.spiegel.de/wirtschaft/index.rss
          priority: medium
        - name: n-tv Wirtschaft
          type: rss
          url: https://www.n-tv.de/wirtschaft/rss
          priority: medium
      finanzen:
        - name: Handelsblatt Finanzen
          type: rss
          url: https://feeds.cms.handelsblatt.com/finanzen
          priority: medium
        - name: FinanzNachrichten Konjunktur
          type: rss
          url: https://www.finanznachrichten.de/rss-nachrichten-wirtschaft-konjunktur
          priority: medium
        - name: Bloomberg Markets
          type: rss
          url: https://feeds.bloomberg.com/markets/news.rss
          priority: medium
      forschung:
        - name: ifo Institut
          type: rss
          url: https://www.ifo.de/rss
          priority: medium


